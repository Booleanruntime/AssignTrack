$kind: http-request
url: "{{baseUrl}}/tasks/{{taskId}}/submit"
method: PUT
headers:
  Authorization: Bearer {{studentToken}}
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", function () { pm.response.to.have.status(200); });
      pm.test("Status moved to Submitted", function () { pm.expect(pm.response.json().status).to.eql("Submitted"); });
    language: text/javascript
order: 8000
