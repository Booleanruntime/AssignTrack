$kind: http-request
url: "{{baseUrl}}/tasks/{{taskId}}"
method: PUT
headers:
  Authorization: Bearer {{studentToken}}
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "status": "Submitted",
      "priority": "High"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 400", function () { pm.response.to.have.status(400); });
      pm.test("Returns the expected message", function () { pm.expect(pm.response.json().message).to.include("Status must be"); });
    language: text/javascript
order: 7000
