$kind: http-request
url: "{{baseUrl}}/grades"
method: GET
headers:
  Authorization: Bearer {{studentToken}}
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", function () { pm.response.to.have.status(200); });
      var gr = pm.response.json();
      pm.test("Returns an array", function () { pm.expect(gr).to.be.an("array"); });
      pm.test("Includes the new grade", function () { pm.expect(gr.some(function (x) { return x._id === pm.collectionVariables.get("gradeId"); })).to.be.true; });
    language: text/javascript
order: 13000
