$kind: http-request
url: "{{baseUrl}}/subjects/{{tempSubjectId}}"
method: DELETE
headers:
  Authorization: Bearer {{adminToken}}
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", function () { pm.response.to.have.status(200); });
      pm.test("Returns the expected message", function () { pm.expect(pm.response.json().message).to.include("Subject deleted successfully"); });
    language: text/javascript
order: 8000
