$kind: http-request
url: "{{baseUrl}}/subjects"
method: POST
headers:
  Authorization: Bearer {{studentToken}}
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "name": "Should Fail",
      "description": "Students cannot create subjects."
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 403", function () { pm.response.to.have.status(403); });
      pm.test("Returns the expected message", function () { pm.expect(pm.response.json().message).to.include("Admin access required"); });
    language: text/javascript
order: 6000
