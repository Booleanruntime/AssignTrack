$kind: http-request
url: "{{baseUrl}}/subjects/{{tempSubjectId}}"
method: PUT
headers:
  Authorization: Bearer {{adminToken}}
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "description": "Description updated by the Postman test run."
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", function () { pm.response.to.have.status(200); });
      pm.test("Description was updated", function () { pm.expect(pm.response.json().description).to.include("updated by the Postman"); });
    language: text/javascript
order: 5000
