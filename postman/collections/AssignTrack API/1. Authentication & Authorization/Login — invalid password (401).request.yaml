$kind: http-request
url: "{{baseUrl}}/auth/login"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "email": "admin@gmail.com",
      "password": "wrong-password"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 401", function () { pm.response.to.have.status(401); });
      pm.test("Returns the expected message", function () { pm.expect(pm.response.json().message).to.include("Invalid email or password"); });
    language: text/javascript
order: 5000
