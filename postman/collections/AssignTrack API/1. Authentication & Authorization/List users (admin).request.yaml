$kind: http-request
url: "{{baseUrl}}/auth/users"
method: GET
headers:
  Authorization: Bearer {{adminToken}}
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", function () { pm.response.to.have.status(200); });
      pm.test("Returns a non-empty array of users", function () { var b = pm.response.json(); pm.expect(b).to.be.an("array"); pm.expect(b.length).to.be.above(0); });
    language: text/javascript
order: 10000
