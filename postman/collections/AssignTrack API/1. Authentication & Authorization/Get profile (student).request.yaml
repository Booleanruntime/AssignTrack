$kind: http-request
url: "{{baseUrl}}/auth/profile"
method: GET
headers:
  Authorization: Bearer {{studentToken}}
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", function () { pm.response.to.have.status(200); });
      pm.test("Returns the profile email", function () { pm.expect(pm.response.json()).to.have.property("email"); });
    language: text/javascript
order: 8000
